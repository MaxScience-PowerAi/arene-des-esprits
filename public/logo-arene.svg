<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a15"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="60" cy="60" r="55" fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="2"/>
  
  <!-- Outer ring -->
  <circle cx="60" cy="60" r="48" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
  
  <!-- Arena floor (hexagon-like) -->
  <polygon points="60,20 95,40 95,80 60,100 25,80 25,40" fill="none" stroke="url(#cyanGrad)" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Inner arena -->
  <polygon points="60,30 85,45 85,75 60,90 35,75 35,45" fill="none" stroke="#5b6ef5" stroke-width="1" opacity="0.5"/>
  
  <!-- Center brain/arena symbol -->
  <circle cx="60" cy="60" r="18" fill="none" stroke="url(#goldGrad)" stroke-width="2" filter="url(#glow)"/>
  
  <!-- Crossed swords -->
  <g transform="translate(60,60)" stroke="url(#goldGrad)" stroke-width="2.5" stroke-linecap="round">
    <!-- Left sword -->
    <line x1="-12" y1="-8" x2="4" y2="8"/>
    <line x1="4" y1="8" x2="8" y2="4"/>
    <!-- Right sword -->
    <line x1="12" y1="-8" x2="-4" y2="8"/>
    <line x1="-4" y1="8" x2="-8" y2="4"/>
  </g>
  
  <!-- Center dot -->
  <circle cx="60" cy="60" r="3" fill="#fff"/>
  
  <!-- Sparkles -->
  <circle cx="60" cy="12" r="2" fill="#fbbf24" opacity="0.8"/>
  <circle cx="105" cy="60" r="1.5" fill="#22d3ee" opacity="0.7"/>
  <circle cx="60" cy="108" r="1.5" fill="#a855f7" opacity="0.7"/>
  <circle cx="15" cy="60" r="1.5" fill="#fbbf24" opacity="0.7"/>
</svg>
